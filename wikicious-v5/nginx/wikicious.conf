upstream wikicious_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name wikicious.io www.wikicious.io api.wikicious.io;
    return 301 https://$host$request_uri;
}

# Main app
server {
    listen 443 ssl http2;
    server_name wikicious.io www.wikicious.io;

    ssl_certificate     /etc/letsencrypt/live/wikicious.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wikicious.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # React SPA
    root /var/www/wikicious/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|jpg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# API + WebSocket
server {
    listen 443 ssl http2;
    server_name api.wikicious.io;

    ssl_certificate     /etc/letsencrypt/live/wikicious.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wikicious.io/privkey.pem;

    # CORS
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    location / {
        proxy_pass         http://wikicious_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade
    location /ws {
        proxy_pass         http://wikicious_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
