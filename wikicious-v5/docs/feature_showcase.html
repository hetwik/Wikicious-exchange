<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wikicious V5 — Complete Feature Showcase · 123 Contracts</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03080F;--bg2:#060D18;--bg3:#090F1E;--card:#0A1525;
  --b:#0E1E30;--b2:#152840;--b3:#1C3050;
  --G:#00F5A8;--B:#0085FF;--V:#7B5CF0;--A:#FFB020;--R:#FF3355;--T:#00D4FF;--O:#FF6B35;
  --t1:#EEF5FF;--t2:#5C7EA0;--t3:#243448;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--t1);cursor:none}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--G)}
#cur{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--G);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:.08s}
#cur2{position:fixed;width:32px;height:32px;border-radius:50%;border:1px solid rgba(0,245,168,.25);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:.06s}

/* HEADER */
.hdr{background:rgba(3,8,15,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--b2);padding:13px 36px;position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:9px;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.5px}
.lm{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--G),var(--B));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000}
.badge{padding:3px 10px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1.5px}
.green-badge{background:rgba(0,245,168,.1);border:1px solid rgba(0,245,168,.2);color:var(--G)}
.blue-badge{background:rgba(0,133,255,.1);border:1px solid rgba(0,133,255,.2);color:var(--B)}
.hdr-right{margin-left:auto;display:flex;gap:7px;align-items:center}
.vbtn{padding:7px 14px;border-radius:9px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:10px;font-weight:700;cursor:none;transition:all .15s;font-family:'DM Sans',sans-serif}
.vbtn.on,.vbtn:hover{background:var(--G);color:#000;border-color:var(--G)}

/* CATS */
.cats{display:flex;gap:6px;padding:12px 36px;overflow-x:auto;border-bottom:1px solid var(--b);position:sticky;top:55px;z-index:100;background:var(--bg2)}
.cats::-webkit-scrollbar{height:0}
.cb{padding:6px 14px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:10px;font-weight:700;cursor:none;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif}
.cb.on,.cb:hover{background:var(--B);color:#fff;border-color:var(--B)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:14px;padding:20px 36px 80px}
.fc{border-radius:14px;background:var(--card);border:1px solid var(--b2);overflow:hidden;cursor:none;transition:transform .2s,border-color .2s,box-shadow .2s}
.fc:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.5)}
.fch{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--b);background:var(--bg3)}
.fci{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fcn{font-weight:700;font-size:12px;color:var(--t1);margin-left:8px}
.fcs{font-size:9px;color:var(--t2);margin-top:1px}
.ftag{padding:2px 8px;border-radius:100px;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace}
.new-tag{background:rgba(0,245,168,.15);border:1px solid rgba(0,245,168,.3);color:var(--G)}

/* SCREEN HELPERS */
.scr{background:var(--bg2);height:240px;overflow:hidden;position:relative}
.bbar{background:var(--bg3);padding:5px 9px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--b)}
.dots{display:flex;gap:3px}.dot{width:6px;height:6px;border-radius:50%}
.url{flex:1;background:var(--b);border-radius:3px;padding:2px 7px;font-size:7px;color:var(--t2);font-family:'JetBrains Mono',monospace}
.sp{background:var(--bg2);padding:8px 10px}
.row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(14,30,48,.8);font-size:8px}
.row span:first-child{color:var(--t2)}.row span:last-child{font-family:'JetBrains Mono',monospace;font-weight:500}
.sbox{background:var(--bg3);border-radius:7px;padding:6px 8px;border:1px solid var(--b)}
.sbox .l{font-size:6px;color:var(--t2);font-weight:700;letter-spacing:.3px}.sbox .v{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;margin-top:1px}
.tabs{display:flex;gap:2px;background:#020810;padding:3px;border-radius:8px;margin-bottom:7px}
.tab{flex:1;text-align:center;padding:5px;border-radius:6px;font-size:8px;font-weight:700;color:var(--t2)}
.inp{background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--t1);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.btn{width:100%;padding:9px;border-radius:9px;border:none;font-weight:700;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.prog{height:3px;background:var(--b2);border-radius:2px;overflow:hidden;margin-top:2px}
.pf{height:100%;border-radius:2px}
.chart{display:flex;align-items:flex-end;gap:1px;height:44px;background:var(--bg3);border-radius:6px;border:1px solid var(--b);padding:3px;overflow:hidden}

/* MODAL */
.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,4,12,.9);backdrop-filter:blur(24px);align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.mbox{background:var(--bg2);border:1px solid var(--b2);border-radius:18px;max-width:1080px;width:100%;max-height:92vh;overflow-y:auto;position:relative}
.mcl{position:absolute;top:10px;right:10px;background:var(--bg3);border:1px solid var(--b2);color:var(--t2);width:26px;height:26px;border-radius:7px;cursor:none;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:5;transition:all .15s}
.mcl:hover{color:var(--t1)}
.mhd{padding:16px 20px 12px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:11px;background:var(--bg3);border-radius:18px 18px 0 0;position:sticky;top:0;z-index:5}
.mbdy{display:grid;grid-template-columns:1fr 1fr}
.mpn{padding:18px}
.mpn+.mpn{border-left:1px solid var(--b2)}
.mlbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.mlbl::after{content:'';flex:1;height:1px;background:var(--b)}
</style>
</head>
<body>
<div id="cur"></div><div id="cur2"></div>

<div class="hdr">
  <div class="logo"><div class="lm">W</div>Wikicious V5</div>

<div class="grid" id="grid"></div>

(function a(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;C2.style.left=rx+'px';C2.style.top=ry+'px';requestAnimationFrame(a)})();

  b.textContent=`${c} (${catCounts[c]||0})`;
  b.onclick=()=>{CAT=c;document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on'));b.classList.add('on');rg()};
  catsEl.appendChild(b);
});

function sv(v){V=v;document.querySelectorAll('.vbtn').forEach(b=>{b.classList.toggle('on',
  (v==='w'&&b.textContent.includes('Web'))||(v==='m'&&b.textContent.includes('Mobile'))||(v==='b'&&b.textContent.includes('Both')))});rg()}

function mkBody(f){
  const brow = (h) => `<div style="background:var(--bg2)"><div class="bbar"><div class="dots"><div class="dot" style="background:#FF5F57"></div><div class="dot" style="background:#FFBD2E"></div><div class="dot" style="background:#28C840"></div></div><div class="url">app.wikicious.io/${f.id}</div></div><div style="height:${h}px;overflow:hidden">${f.w}</div></div>`;
  if(V==='w') return brow(240);
  if(V==='m') return `<div style="display:flex;justify-content:center;padding:6px 0;background:var(--bg2)">${f.m}</div>`;
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px;background:var(--bg2)">
    <div>${brow(195)}</div>
    <div style="display:flex;justify-content:center;align-items:center;background:var(--bg2);padding:4px 0">${f.m}</div>
  </div>`;
}

function rg(){
  const shown=F.filter(f=>CAT==='ALL'||f.cat===CAT);
  document.getElementById('grid').innerHTML=shown.map(f=>`
    <div class="fc" onclick="om('${f.id}')" style="border-color:${f.c}15">
      <div class="fch">
        <div style="display:flex;align-items:center">
          <div class="fci" style="background:${f.c}18;border:1px solid ${f.c}30">${f.i}</div>
          <div><div class="fcn">${f.n}</div><div class="fcs">${f.s}</div></div>
        </div>
        <span class="ftag ${f.t==='NEW'?'new-tag':''}" style="${f.t!=='NEW'?`background:${f.c}15;border:1px solid ${f.c}30;color:${f.c}`:''}">${f.t}</span>
      </div>
      ${mkBody(f)}
    </div>`).join('');
}

function om(id){
  const f=F.find(x=>x.id===id);
  document.getElementById('mc').innerHTML=`
    <div class="mhd">
      <div class="fci" style="background:${f.c}18;border:1px solid ${f.c}30;width:38px;height:38px;border-radius:10px;font-size:18px">${f.i}</div>
      <div><div style="font-size:17px;font-weight:800">${f.n}</div><div style="font-size:10px;color:var(--t2);margin-top:2px">${f.s}</div></div>
      <span class="ftag ${f.t==='NEW'?'new-tag':''}" style="margin-left:auto;${f.t!=='NEW'?`background:${f.c}15;border:1px solid ${f.c}30;color:${f.c}`:''}">${f.t}</span>
    </div>
    <div class="mbdy">
      <div class="mpn">
        <div class="mlbl">🖥 WEB APP</div>
        <div style="background:var(--bg2);border-radius:10px;overflow:hidden">
          <div class="bbar"><div class="dots"><div class="dot" style="background:#FF5F57"></div><div class="dot" style="background:#FFBD2E"></div><div class="dot" style="background:#28C840"></div></div><div class="url">app.wikicious.io/${f.id}</div></div>
          <div style="height:360px;overflow:hidden">${f.w}</div>
        </div>
      </div>
      <div class="mpn">
        <div class="mlbl">📱 FLUTTER MOBILE</div>
        <div style="display:flex;justify-content:center">
          <div style="width:200px;height:400px;border-radius:30px;background:linear-gradient(155deg,#101E35,#060D1A);border:2px solid #1C3050;padding:2px;box-shadow:0 20px 48px rgba(0,0,0,.8)">
            <div style="position:relative;width:100%;height:100%;border-radius:28px;overflow:hidden;background:var(--bg)">
              <div style="position:absolute;top:6px;left:50%;transform:translateX(-50%);width:52px;height:12px;background:var(--bg);border-radius:7px;z-index:5"></div>
              ${f.m}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function cm(e){if(!e||e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open')}

rg();
</script>
</body>
</html>
