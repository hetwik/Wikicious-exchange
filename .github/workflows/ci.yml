# This is a GitHub Actions workflow file for installing npm dependencies, compiling Solidity contracts, and running tests.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install npm dependencies
      run: |
        cd contracts
        npm install

    - name: Compile Solidity contracts
      run: |
        cd contracts
        npx truffle compile

    - name: Run tests
      run: |
        cd contracts
        npx truffle test
